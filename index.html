<header class="h-16 md:h-20 px-4 md:px-10 flex items-center justify-between bg-white border-b border-slate-200 sticky top-0 z-[100]">
    <div class="flex items-center gap-2">
        <button id="add-lead-btn" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-xl text-xs font-bold flex items-center gap-1 shadow-md">
            <i data-lucide="plus" size="16"></i> <span>追加</span>
        </button>
    </div>

    <div class="md:hidden flex bg-slate-100 p-1 rounded-xl">
        <button onclick="switchView('leads')" id="mob-nav-leads" class="p-2 rounded-lg bg-white shadow-sm text-blue-600"><i data-lucide="list-todo" size="18"></i></button>
        <button onclick="switchView('analytics')" id="mob-nav-analytics" class="p-2 rounded-lg text-slate-400"><i data-lucide="bar-chart-3" size="18"></i></button>
    </div>

    <div class="flex items-center gap-2">
        <div class="relative shrink-0">
            <select id="month-selector" class="appearance-none bg-slate-100 pl-3 pr-8 py-2 rounded-xl text-xs font-bold text-slate-700 outline-none border-none"></select>
            <i data-lucide="chevron-down" size="12" class="absolute right-2.5 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400"></i>
        </div>
        
        <button onclick="handleLogout()" class="p-2 bg-red-50 text-red-500 rounded-xl border border-red-100 transition-all" title="ログアウト">
            <i data-lucide="log-out" size="18"></i>
        </button>
    </div>
</header>

<div id="mobile-menu" class="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[150] hidden flex-col items-center justify-center p-6">
    <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-8 space-y-6 shadow-2xl relative">
        <button onclick="toggleMobileMenu()" class="absolute top-6 right-6 text-slate-300 hover:text-slate-900">
            <i data-lucide="x" size="24"></i>
        </button>
        
        <div class="text-center pb-2">
            <h2 class="text-xl font-bold text-slate-800">Menu</h2>
            <p class="text-xs text-slate-400 font-bold uppercase tracking-widest">Settings & Navigation</p>
        </div>

        <div class="space-y-3">
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest px-2">Select Month</p>
            <div class="relative">
                <select id="month-selector-mob" onchange="handleMonthChange(this.value)" class="w-full appearance-none bg-slate-100 p-4 rounded-2xl text-sm font-bold text-slate-700 outline-none border-none"></select>
                <i data-lucide="chevron-down" size="16" class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400"></i>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-3">
            <button onclick="switchView('leads'); toggleMobileMenu();" class="flex flex-col items-center gap-2 p-4 bg-slate-50 rounded-2xl hover:bg-blue-50 hover:text-blue-600 transition-all">
                <i data-lucide="list-todo" size="24"></i><span class="text-xs font-bold">案件一覧</span>
            </button>
            <button onclick="switchView('analytics'); toggleMobileMenu();" class="flex flex-col items-center gap-2 p-4 bg-slate-50 rounded-2xl hover:bg-blue-50 hover:text-blue-600 transition-all">
                <i data-lucide="bar-chart-3" size="24"></i><span class="text-xs font-bold">分析</span>
            </button>
        </div>

        <div class="pt-4 border-t border-slate-100">
            <button onclick="handleLogout()" class="w-full py-4 bg-red-50 text-red-500 rounded-2xl font-bold flex items-center justify-center gap-2 hover:bg-red-100 transition-all">
                <i data-lucide="log-out" size="20"></i>ログアウト
            </button>
        </div>
    </div>
</div>

<script>
// 追加する制御用JavaScript
function toggleMobileMenu() {
    const menu = document.getElementById('mobile-menu');
    menu.classList.toggle('hidden');
    menu.classList.toggle('flex');
    
    // モバイルメニュー内の月選択を同期
    if (!menu.classList.contains('hidden')) {
        const mobSelect = document.getElementById('month-selector-mob');
        const pcSelect = document.getElementById('month-selector');
        if (pcSelect) {
            mobSelect.innerHTML = pcSelect.innerHTML;
            mobSelect.value = selectedMonth;
        }
    }
}

function handleMonthChange(val) {
    selectedMonth = val;
    const pcSelect = document.getElementById('month-selector');
    if (pcSelect) pcSelect.value = val;
    refreshUI();
    toggleMobileMenu();
}
</script>
