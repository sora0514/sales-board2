<header class="h-20 px-4 flex items-center justify-between bg-white border-b border-slate-200 sticky top-0 z-[100]">
    <div class="flex items-center gap-2">
        <div class="bg-blue-600 p-2 rounded-xl text-white shadow-lg md:flex hidden">
            <i data-lucide="shield-check" size="20"></i>
        </div>
        <button id="add-lead-btn" class="bg-blue-600 hover:bg-blue-700 text-white px-3 py-2 rounded-xl text-xs font-bold flex items-center gap-1 shadow-md">
            <i data-lucide="plus" size="16"></i><span>追加</span>
        </button>
    </div>

    <div class="md:hidden flex bg-slate-100 p-1 rounded-xl">
        <button onclick="switchView('leads')" id="mob-nav-leads" class="p-2 rounded-lg bg-white shadow-sm text-blue-600 transition-all">
            <i data-lucide="list-todo" size="18"></i>
        </button>
        <button onclick="switchView('analytics')" id="mob-nav-analytics" class="p-2 rounded-lg text-slate-400 transition-all">
            <i data-lucide="bar-chart-3" size="18"></i>
        </button>
    </div>

    <div class="flex items-center gap-3">
        <div class="relative shrink-0">
            <select id="month-selector" class="appearance-none bg-slate-100 pl-2 pr-7 py-2 rounded-lg text-xs font-bold text-slate-700 outline-none border-none"></select>
            <i data-lucide="chevron-down" size="10" class="absolute right-2 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400"></i>
        </div>
        
        <button onclick="handleLogout()" class="p-2 bg-red-50 text-red-500 rounded-lg hover:bg-red-100 transition-all border border-red-100" title="ログアウト">
            <i data-lucide="log-out" size="20"></i>
        </button>
    </div>
</header>
